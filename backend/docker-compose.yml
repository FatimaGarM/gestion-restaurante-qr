services:

  mysql:
    image: mysql:8.3
    container_name: mysql_gestionqr
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_DATABASE: restaurante_qr
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    volumes:
      - ./uploads:/app/uploads
    container_name: backend_gestionqr
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"

  frontend:
    build: ../frontend
    volumes:
    - ./uploads:/usr/share/nginx/html/uploads
    container_name: frontend_gestionqr
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data: