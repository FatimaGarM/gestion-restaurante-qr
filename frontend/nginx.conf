server {
    listen 80;

    # =========================
    # API BACKEND
    # =========================
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================
    # UPLOADS
    # =========================
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        access_log off;
        expires 30d;
    }

    # =========================
    # FRONTEND SPA
    # =========================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # =========================
    # BLOQUEO DE ATAQUES TÍPICOS
    # =========================
    location ~* (phpunit|vendor|\.env|cgi-bin|\.git|wp-admin|config) {
        return 444;
    }

    # bloquear archivos ocultos
    location ~ /\.(?!well-known) {
        return 444;
    }
}