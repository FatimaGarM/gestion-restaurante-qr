server {
    listen 443 ssl;
    server_name restauranteqr.stusite.me;

    ssl_certificate /etc/letsencrypt/live/restauranteqr.stusite.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/restauranteqr.stusite.me/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
    }
}